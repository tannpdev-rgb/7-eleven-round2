name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_IMAGE_BE }}:latest

      - name: Pull and Run Backend on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            docker pull ${{ secrets.DOCKER_IMAGE_BE }}:latest
            docker stop dailymart-backend || true
            docker rm dailymart-backend || true
            docker run -d \
              --name dailymart-backend \
              -p 8080:8080 \
              --network dailymart-net \
              -e DB_HOST=${{ secrets.DB_HOST || 'dailymart-db' }} \
              -e DB_PORT=${{ secrets.DB_PORT || '5432' }} \
              -e DB_NAME=${{ secrets.DB_NAME || 'ecommerce_db' }} \
              -e DB_USER=${{ secrets.DB_USER || 'postgres' }} \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD || 'Postgres@2026' }}" \
              ${{ secrets.DOCKER_IMAGE_BE }}:latest
            docker image prune -f
